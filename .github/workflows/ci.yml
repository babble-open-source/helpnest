name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @helpnest/db db:generate

      - name: Build SDK (needed by MCP typecheck)
        run: pnpm --filter @helpnest/sdk build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    # apps/web has integration tests that need a real Postgres. The vitest
    # globalSetup runs `prisma db push` against DATABASE_URL (set via the job
    # env below — apps/web/.env.test is gitignored and absent in CI), so the
    # test job must provide that database.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: helpnest
          POSTGRES_PASSWORD: helpnest
          POSTGRES_DB: helpnest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helpnest -d helpnest_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Mirrors apps/web/.env.test.example so the globalSetup db push and the
      # tests target the service container (the real .env.test is gitignored
      # and not present in CI; vitest setup falls back to these env vars).
      # AUTH_SECRET is set in case a route test imports the auth config at
      # module load.
      DATABASE_URL: postgresql://helpnest:helpnest@localhost:5432/helpnest_test
      AUTH_SECRET: ci-secret-for-tests
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @helpnest/db db:generate

      - name: Run tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    env:
      DATABASE_URL: postgresql://helpnest:helpnest@localhost:5432/helpnest_test
      AUTH_SECRET: ci-secret-for-build
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      OPENAI_API_KEY: placeholder-for-build
      ANTHROPIC_API_KEY: placeholder-for-build
      QDRANT_URL: http://localhost:6333
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @helpnest/db db:generate

      - name: Build
        run: pnpm build

  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @helpnest/db db:generate

      - name: Run migrations
        run: cd packages/db && npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
