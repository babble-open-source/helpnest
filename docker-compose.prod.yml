version: '3.9'

services:
  app:
    image: helpnest:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helpnest_app
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: helpnest_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-helpnest}
      POSTGRES_USER: ${POSTGRES_USER:-helpnest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-helpnest}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: helpnest_redis_prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    container_name: helpnest_qdrant_prod
    restart: unless-stopped
    volumes:
      - qdrant_prod_data:/qdrant/storage
    # Not exposed externally — app connects internally

volumes:
  postgres_prod_data:
  redis_prod_data:
  qdrant_prod_data:
