version: '3.9'

services:
  # Runs prisma migrate deploy before the app starts.
  # Exits on completion; the app service depends on it finishing successfully.
  migrate:
    image: helpnest:latest
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    container_name: helpnest_migrate
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    command:
      - node
      - /app/packages/db/node_modules/prisma/build/index.js
      - migrate
      - deploy
      - --schema=/app/packages/db/prisma/schema.prisma
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  app:
    image: helpnest:latest
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    container_name: helpnest_app
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Required for Next-auth v5 when running behind a reverse proxy (nginx, Caddy, etc.)
      - AUTH_TRUST_HOST=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: helpnest_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-helpnest}
      POSTGRES_USER: ${POSTGRES_USER:-helpnest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-helpnest}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: helpnest_redis_prod
    restart: unless-stopped
    command: redis-server ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      # Pass the password to redis-cli so the PING succeeds when auth is enabled.
      test: ['CMD-SHELL', 'redis-cli ${REDIS_PASSWORD:+-a "$REDIS_PASSWORD" --no-auth-warning} ping']
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    container_name: helpnest_qdrant_prod
    restart: unless-stopped
    volumes:
      - qdrant_prod_data:/qdrant/storage
    # Not exposed externally — app connects via QDRANT_URL=http://qdrant:6333

volumes:
  postgres_prod_data:
  redis_prod_data:
  qdrant_prod_data:
